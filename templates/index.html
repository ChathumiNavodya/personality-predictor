<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Predictor</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin: 0 0 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
            font-size: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #1e293b;
            font-weight: 700;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            height: 44px;
            padding: 10px 13px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            background: #ffffff;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.18);
        }

        button {
            width: 100%;
            height: 50px;
            margin-top: 6px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .result {
            margin-top: 20px;
            padding: 18px;
            border-radius: 16px;
            background: #ecfdf5;
            color: #047857;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
        }

        .api-note {
            margin-top: 18px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .container {
                padding: 20px;
                border-radius: 18px;
            }

            h1 {
                font-size: 23px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Introvert / Extrovert Predictor</h1>
        <p class="subtitle">Enter your details and get an instant personality prediction.</p>

        <form method="POST">
            <label>Time Spent Alone</label>
            <input type="number" name="Time_spent_Alone" min="0" max="11" placeholder="Example: 8" required>

            <label>Stage Fear</label>
            <select name="Stage_fear" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Social Event Attendance</label>
            <input type="number" name="Social_event_attendance" min="0" max="10" placeholder="Example: 2" required>

            <label>Going Outside</label>
            <input type="number" name="Going_outside" min="0" max="7" placeholder="Example: 1" required>

            <label>Drained After Socializing</label>
            <select name="Drained_after_socializing" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Friends Circle Size</label>
            <input type="number" name="Friends_circle_size" min="0" max="20" placeholder="Example: 3" required>

            <label>Post Frequency</label>
            <input type="number" name="Post_frequency" min="0" max="10" placeholder="Example: 1" required>

            <button type="submit">Predict Personality</button>
        </form>

        {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
        {% endif %}

        <p class="api-note">API endpoint: <strong>/predict</strong></p>
    </div>
</body>
</html>
